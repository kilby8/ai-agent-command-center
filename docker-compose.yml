services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    networks:
      - ai-network

  api:
    build: .
    ports:
      - "3001:3000"
    environment:
      OLLAMA_URL: http://ollama:11434
      OPENCLAW_URL: http://localhost:18789
      NODE_ENV: production
    depends_on:
      - ollama
    networks:
      - ai-network
    volumes:
      - ./vaults:/vaults

volumes:
  ollama_data:

networks:
  ai-network:
    driver: bridge
