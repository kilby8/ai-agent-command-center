<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Command Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: radial-gradient(ellipse at center, #0a0e27 0%, #050812 100%);
            color: #00ff88;
            overflow: hidden;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 255, 136, 0.05) 25%, rgba(0, 255, 136, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 136, 0.05) 75%, rgba(0, 255, 136, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 136, 0.05) 25%, rgba(0, 255, 136, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 136, 0.05) 75%, rgba(0, 255, 136, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            pointer-events: none;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        #canvas { display: block; position: relative; z-index: 1; }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hud-panel {
            position: absolute;
            background: linear-gradient(135deg, rgba(0, 20, 40, 0.95) 0%, rgba(0, 10, 20, 0.95) 100%);
            border: 2px solid #00ff88;
            border-radius: 4px;
            padding: 16px;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            box-shadow: 
                0 0 20px rgba(0, 255, 136, 0.3),
                inset 0 0 20px rgba(0, 255, 136, 0.05),
                0 0 40px rgba(0, 0, 0, 0.8);
            font-size: 11px;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .hud-panel h3 {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.3);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #a8edea;
            text-shadow: 0 0 15px rgba(168, 237, 234, 0.8);
            flex-shrink: 0;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            line-height: 1.4;
            word-wrap: break-word;
            max-width: 90%;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: rgba(0, 255, 136, 0.15);
            border-left: 2px solid #00ff88;
        }

        .message.assistant {
            align-self: flex-start;
            background: rgba(168, 237, 234, 0.1);
            border-left: 2px solid #a8edea;
        }

        .message-timestamp {
            font-size: 9px;
            color: rgba(0, 255, 136, 0.5);
            margin-top: 2px;
        }

        .chat-input-area {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 136, 0.5);
            color: #00ff88;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            border-radius: 2px;
            resize: none;
            max-height: 60px;
        }

        .chat-input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .chat-send-btn {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 12px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            text-transform: uppercase;
            border-radius: 2px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .chat-send-btn:hover {
            background: rgba(0, 255, 136, 0.4);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            margin-right: 6px;
            animation: pulse 1s ease-in-out infinite;
        }

        .status-indicator.alert {
            background: #ff0055;
            box-shadow: 0 0 15px #ff0055;
            animation: alertPulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes alertPulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 15px #ff0055; }
            50% { opacity: 0.3; box-shadow: 0 0 5px #ff0055; }
        }

        .tactical-map {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(0, 50, 100, 0.8), rgba(0, 10, 30, 0.9));
            border: 1px solid rgba(0, 255, 136, 0.5);
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .map-grid {
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.1) 1px, transparent 1px);
            background-size: 25px 25px;
            position: relative;
        }

        .map-agent {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #00ff88;
            border: 1px solid #a8edea;
            border-radius: 50%;
            box-shadow: 0 0 5px currentColor;
            transform: translate(-50%, -50%);
        }

        .map-resource {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffd700;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 3px #ffd700;
        }

        .agent-log {
            max-height: 180px;
            overflow-y: auto;
            font-size: 10px;
            line-height: 1.4;
        }

        .log-entry {
            padding: 4px;
            margin: 2px 0;
            border-left: 2px solid rgba(0, 255, 136, 0.3);
            padding-left: 8px;
            font-family: 'Courier New', monospace;
        }

        .log-entry.alert {
            border-left-color: #ff0055;
            color: #ff0055;
            text-shadow: 0 0 5px #ff0055;
        }

        .log-entry.success {
            color: #a8edea;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
        }

        .stats-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: rgba(0, 255, 136, 0.7);
        }

        .stat-value {
            color: #a8edea;
            font-weight: bold;
        }

        button {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 6px 10px;
            margin: 4px 4px 4px 0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            text-transform: uppercase;
            transition: all 0.2s;
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.3);
            border-radius: 2px;
        }

        button:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }

        button:active {
            transform: scale(0.98);
        }

        #commandCenter {
            top: 10px;
            left: 10px;
            width: 320px;
            height: 220px;
        }

        #chatInterface {
            top: 10px;
            left: 340px;
            width: 450px;
            height: 380px;
        }

        #tacticalDisplay {
            top: 10px;
            right: 10px;
            width: 280px;
        }

        #agentMonitor {
            top: 310px;
            right: 10px;
            width: 280px;
            max-height: 350px;
        }

        #commsLog {
            bottom: 10px;
            left: 10px;
            width: 320px;
            max-height: 280px;
        }

        #missionControl {
            bottom: 10px;
            right: 10px;
            width: 300px;
        }

        .alert-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 85, 0.9);
            border: 2px solid #ff0055;
            color: #fff;
            padding: 20px 40px;
            border-radius: 4px;
            font-size: 18px;
            text-align: center;
            z-index: 100;
            display: none;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.8);
            animation: alertBounce 0.5s ease-out;
        }

        @keyframes alertBounce {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 50;
            animation: scanlineMove 8s linear infinite;
        }

        @keyframes scanlineMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 255, 136, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 136, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="scanline"></div>
    <div id="ui">
        <div id="commandCenter" class="hud-panel">
            <h3>⚡ COMMAND CENTER</h3>
            <div class="stats-row">
                <span class="stat-label">STATUS:</span>
                <span><span class="status-indicator" id="systemStatus"></span>ONLINE</span>
            </div>
            <div class="stats-row">
                <span class="stat-label">AGENTS:</span>
                <span class="stat-value" id="agentCount">0</span>
            </div>
            <div class="stats-row">
                <span class="stat-label">ENERGY:</span>
                <span class="stat-value" id="arenaEnergy">0%</span>
            </div>
            <div class="stats-row">
                <span class="stat-label">RESOURCES:</span>
                <span class="stat-value" id="resourceCount">0</span>
            </div>
            
            <div style="margin-top: 8px; border-top: 1px solid rgba(0, 255, 136, 0.3); padding-top: 8px; font-size: 10px;">
                <input type="text" id="agentName" placeholder="AGENT NAME" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(0,255,136,0.3); color: #00ff88; padding: 4px; margin-bottom: 4px; font-size: 10px;">
                <input type="text" id="agentGoal" placeholder="MISSION" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(0,255,136,0.3); color: #00ff88; padding: 4px; margin-bottom: 4px; font-size: 10px;">
                <button onclick="spawnAgent()" style="width: 48%;">▶ DEPLOY</button>
                <button onclick="toggleAutoThink()" style="width: 48%; margin-left: 4%;">⚙ AUTO</button>
            </div>
        </div>

        <div id="chatInterface" class="hud-panel">
            <h3>💬 AI CHAT INTERFACE</h3>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Ask me anything..." onkeypress="handleChatKeypress(event)">
                    <button class="chat-send-btn" onclick="sendChatMessage()">SEND</button>
                </div>
            </div>
        </div>

        <div id="tacticalDisplay" class="hud-panel">
            <h3>🎯 TACTICAL MAP</h3>
            <div class="tactical-map">
                <div class="map-grid" id="mapGrid"></div>
            </div>
            <div style="margin-top: 8px; font-size: 9px; color: rgba(0, 255, 136, 0.6);">
                <span style="color: #00ff88;">●</span> Agents
                <span style="color: #ffd700; margin-left: 8px;">●</span> Resources
            </div>
        </div>

        <div id="agentMonitor" class="hud-panel">
            <h3>👾 AGENT STATUS</h3>
            <div id="agentList" class="agent-log">
                <div class="log-entry">NO AGENTS DEPLOYED</div>
            </div>
        </div>

        <div id="commsLog" class="hud-panel">
            <h3>📡 COMMS LOG</h3>
            <div id="commsLogContent" class="agent-log">
                <div class="log-entry">[SYSTEM] Command center online.</div>
            </div>
        </div>

        <div id="missionControl" class="hud-panel">
            <h3>🎯 MISSION STATS</h3>
            <div class="stats-row">
                <span class="stat-label">TIME:</span>
                <span class="stat-value" id="missionTime">00:00</span>
            </div>
            <div class="stats-row">
                <span class="stat-label">COLLECTED:</span>
                <span class="stat-value" id="totalCollected">0</span>
            </div>
            <div class="stats-row">
                <span class="stat-label">EFFICIENCY:</span>
                <span class="stat-value" id="efficiency">0%</span>
            </div>
        </div>

        <div id="alertBanner" class="alert-banner"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="command-center.js"></script>
</body>
</html>
